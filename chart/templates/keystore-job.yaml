{{- if .Values.keystoreJob.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ssc.fullname" . }}-keystore
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ssc.fullname" . }}-keystore
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ssc.fullname" . }}-keystore
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ssc.fullname" . }}-keystore
subjects:
- kind: ServiceAccount
  name: {{ include "ssc.fullname" . }}-keystore
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ssc.fullname" . }}-keystore-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "ssc.labels" (merge (dict "component" "keystore-job") .) | nindent 8 }}
        job: keystore-generator
        sidecar.istio.io/inject: "false"
    spec:
      activeDeadlineSeconds: 120
      restartPolicy: Never
      serviceAccountName: {{ include "ssc.fullname" . }}-keystore
      automountServiceAccountToken: true
      {{- with .Values.upstream.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: keystore-generator
        image: "{{ .Values.keystoreJob.image }}:{{ .Values.keystoreJob.tag }}"
        imagePullPolicy: Always
        resources:
          {{- toYaml .Values.keystoreJob.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: {{ .Values.upstream.user.uid | default 1111 }}
          runAsGroup: {{ .Values.upstream.user.gid | default 1111 }}
        volumeMounts:
        - name: keystore-data
          mountPath: /data
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e
          echo "Starting keystore generation..."
          
          # Generate self-signed certificate and keystore
          echo "Generating self-signed certificate for {{ .Values.upstream.urlHost }}..."
          openssl req -newkey rsa:4096 -nodes \
            -keyout /data/key.pem \
            -x509 -days 365 \
            -out /data/certificate.pem \
            -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit"
          
          echo "Creating PKCS12 keystore..."
          openssl pkcs12 -export \
            -in /data/certificate.pem \
            -inkey /data/key.pem \
            -out /data/keystore.p12 \
            -name {{ .Values.keystoreJob.certAlias }} \
            -passout pass:{{ .Values.keystoreJob.keyStorePassword }}
          
          # Generate keystore passwords
          echo -n "{{ .Values.keystoreJob.keyStorePassword }}" > /data/keystore-password.txt
          echo -n "{{ .Values.keystoreJob.keyStoreCertPassword }}" > /data/keystore-cert-password.txt
          
          # Write license and autoconfig files
          echo "Writing license and autoconfig files..."
          echo '{{ .Values.fortify_license | b64enc }}' | base64 -d > /data/fortify.license
          echo '{{ .Values.fortify_autoconfig | b64enc }}' | base64 -d > /data/ssc.autoconfig
          
          echo "Keystore and config files generated successfully!"
      containers:
      - name: secret-creator
        image: "registry1.dso.mil/ironbank/opensource/kubernetes/kubectl:v1.30.6"
        imagePullPolicy: Always
        resources:
          {{- toYaml .Values.keystoreJob.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: {{ .Values.upstream.user.uid | default 1111 }}
          runAsGroup: {{ .Values.upstream.user.gid | default 1111 }}
        volumeMounts:
        - name: keystore-data
          mountPath: /data
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e
          echo "Creating Kubernetes secret..."
          
          # Setup kubectl to use in-cluster ServiceAccount
          export KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          export KUBE_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          export KUBE_API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
          
          # Configure kubectl alias with authentication
          kubectl() {
            command kubectl --server="${KUBE_API}" --token="${KUBE_TOKEN}" --certificate-authority="${KUBE_CA}" "$@"
          }
          
          # Check if secret exists and has all required keys
          SECRET_NAME="{{ .Values.upstream.secretRef.name | default "fortify-ssc-secret" }}"
          SECRET_EXISTS=false
          SECRET_VALID=false
          
          if kubectl get secret ${SECRET_NAME} -n {{ .Release.Namespace }} 2>/dev/null; then
            SECRET_EXISTS=true
            echo "Secret ${SECRET_NAME} exists, validating required keys..."
            
            # Check all required keys exist
            REQUIRED_KEYS=(
              "{{ .Values.upstream.secretRef.keys.sscLicenseEntry }}"
              "{{ .Values.upstream.secretRef.keys.sscAutoconfigEntry }}"
              "{{ .Values.upstream.secretRef.keys.httpCertificateKeystoreFileEntry }}"
              "{{ .Values.upstream.secretRef.keys.httpCertificateKeystorePasswordEntry }}"
              "{{ .Values.upstream.secretRef.keys.httpCertificateKeyPasswordEntry }}"
            )
            
            SECRET_VALID=true
            for key in "${REQUIRED_KEYS[@]}"; do
              if ! kubectl get secret ${SECRET_NAME} -n {{ .Release.Namespace }} -o jsonpath="{.data.${key}}" 2>/dev/null | grep -q .; then
                echo "Missing or empty key: ${key}"
                SECRET_VALID=false
                break
              fi
            done
          fi
          
          if [ "${SECRET_EXISTS}" = "true" ] && [ "${SECRET_VALID}" = "true" ]; then
            {{- if .Values.keystoreJob.recreate }}
            echo "Valid secret exists but recreate=true, deleting and recreating..."
            kubectl delete secret ${SECRET_NAME} -n {{ .Release.Namespace }}
            {{- else }}
            echo "Valid secret exists and recreate=false, skipping..."
            # Ensure Helm won't delete this secret during upgrade (resource-policy: keep)
            kubectl annotate secret ${SECRET_NAME} -n {{ .Release.Namespace }} "helm.sh/resource-policy=keep" --overwrite 2>/dev/null || true
            exit 0
            {{- end }}
          elif [ "${SECRET_EXISTS}" = "true" ] && [ "${SECRET_VALID}" = "false" ]; then
            echo "Secret exists but is invalid, recreating..."
            kubectl delete secret ${SECRET_NAME} -n {{ .Release.Namespace }}
          else
            echo "Secret does not exist, creating..."
          fi
          
          # Create the Kubernetes secret
          kubectl create secret generic {{ .Values.upstream.secretRef.name | default "fortify-ssc-secret" }} \
            --from-file={{ .Values.upstream.secretRef.keys.sscLicenseEntry }}=/data/fortify.license \
            --from-file={{ .Values.upstream.secretRef.keys.sscAutoconfigEntry }}=/data/ssc.autoconfig \
            --from-file={{ .Values.upstream.secretRef.keys.httpCertificateKeystoreFileEntry }}=/data/keystore.p12 \
            --from-file={{ .Values.upstream.secretRef.keys.httpCertificateKeystorePasswordEntry }}=/data/keystore-password.txt \
            --from-file={{ .Values.upstream.secretRef.keys.httpCertificateKeyPasswordEntry }}=/data/keystore-cert-password.txt \
            --namespace={{ .Release.Namespace }}
          
          echo "Secret created successfully!"

          # Prevent Helm from deleting this secret during upgrades (migrated from template to hook)
          kubectl annotate secret ${SECRET_NAME} -n {{ .Release.Namespace }} "helm.sh/resource-policy=keep" --overwrite

          # Verify secret creation
          kubectl describe secret {{ .Values.upstream.secretRef.name | default "fortify-ssc-secret" }} -n {{ .Release.Namespace }}
      volumes:
      - name: keystore-data
        emptyDir: {}
{{- end }}