# BigBang Passthrough Values for Fortify SSC
#
# IMPORTANT: This chart uses a passthrough pattern where:
# - The upstream helm-ssc chart is included as a subchart with alias 'upstream'
# - BigBang-specific templates in /templates/bigbang/ add Istio, network policies, etc.
# - Upstream chart configuration is customized via values passed to 'upstream:'
# - Istio sidecar timing issues are handled via podAnnotations (holdApplicationUntilProxyStarts)

# Values to pass through to the upstream helm-ssc chart (aliased as 'upstream')
# Only overrides from upstream defaults are specified here
upstream:
  # Pod annotations for Istio sidecar configuration
  # holdApplicationUntilProxyStarts ensures the app waits for Istio proxy to be ready
  # This prevents MySQL connection failures due to Istio endpoint propagation timing
  podAnnotations:
    proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'

  # image is a map of the global Kubernetes image settings
  image:
    # Override to use Iron Bank images
    repository: "registry1.dso.mil/ironbank/microfocus/fortify/ssc"
    # pullPolicy is Kubernetes image pull policy, supported values are Always, IfNotPresent, and Never
    pullPolicy: Always
    # tag for SSC webapp image
    tag: "25.4.0.0137"

  # imagePullSecrets is a list of Kubernetes image pull secrets
  imagePullSecrets:
    - name: "private-registry"

  # nameOverride is a value to override service name, defaults to the helm chart name (ssc)
  nameOverride: "fortify-ssc"

  # fullnameOverride is a value to override fully-qualified service, defaults to "{deployment_name}-{service_name}"
  fullnameOverride: "fortify-ssc"

  # urlHost is a fully qualified DNS name for externally accessing the application (required)
  urlHost: "fortify.dev.bigbang.mil"

  # secretRef is a reference to externally managed Kubernetes secret (required)
  secretRef:
    # name is a name of externally managed Kubernetes secret to be used for configuration (required)
    name: "fortify-ssc-secret"
    # keys is a map of key names for externally managed Kubernetes secret (required)
    keys:
      sscLicenseEntry: "fortify.license"
      sscAutoconfigEntry: "ssc.autoconfig"
      httpCertificateKeystoreFileEntry: "ssc-service.jks"
      httpCertificateKeystorePasswordEntry: "ssc-service.jks.password"
      httpCertificateKeyPasswordEntry: "ssc-service.jks.key.password"

  # Disable enforceSecureTransport since Istio terminates TLS at the gateway
  # and forwards to SSC on HTTP. Without this, SSC 302-redirects to HTTPS in a loop.
  environment:
    - name: COM_FORTIFY_SSC_ENFORCESECURETRANSPORT
      value: "false"

  # JVM configuration
  jvmExtraOptions: "-Dcom.redhat.fips=false"  # Disable FIPS mode

  # resources is Kubernetes Pod resources specification
  resources:
    limits:
      cpu: 4
      memory: 16Gi
    requests:
      memory: 4Gi

  # User configuration - Override GID for BigBang/OpenShift compatibility
  user:
    gid: 1111  # Override from default 0 to 1111 for non-root group

#################################################
# BigBang Specific Values - NOT passed to upstream
#################################################

# OpenShift Support
openshift: false  # Set to true for OpenShift deployments

# Legacy naming values for BigBang templates
# These must match upstream values for consistent labeling
nameOverride: "fortify-ssc"
fullnameOverride: "fortify-ssc"

# MySQL Dependency Values
mysql:
  enabled: true
  fullnameOverride: ""
  global:
    imageRegistry: "registry1.dso.mil/ironbank"
    imagePullSecrets:
      - private-registry
  image:
    repository: bitnami/mysql8
    tag: 8.0.36-debian-11-r1
  auth:
    rootPassword: "password"
    database: "ssc_db"
  primary:
    configuration: |-
      [mysqld]
      default_authentication_plugin=mysql_native_password
      skip-name-resolve
      explicit_defaults_for_timestamp
      basedir=/opt/bitnami/mysql
      plugin_dir=/opt/bitnami/mysql/lib/plugin
      port=3306
      socket=/opt/bitnami/mysql/tmp/mysql.sock
      datadir=/bitnami/mysql/data
      tmpdir=/opt/bitnami/mysql/tmp
      bind-address=0.0.0.0
      pid-file=/opt/bitnami/mysql/tmp/mysqld.pid
      log-error=/opt/bitnami/mysql/logs/mysqld.log
      character-set-server=latin1
      collation-server=latin1_general_cs
      slow_query_log=0
      slow_query_log_file=/opt/bitnami/mysql/logs/mysqld.log
      long_query_time=10.0
      default_storage_engine=INNODB
      innodb_buffer_pool_size=512M
      innodb_lock_wait_timeout=300
      innodb_log_file_size=512M
      max_allowed_packet=1G
      sql-mode="TRADITIONAL"

      [mysqldump]
      max_allowed_packet=1G

      [client]
      port=3306
      socket=/opt/bitnami/mysql/tmp/mysql.sock
      default-character-set=UTF8
      plugin_dir=/opt/bitnami/mysql/lib/plugin

      [manager]
      port=3306
      socket=/opt/bitnami/mysql/tmp/mysql.sock
      pid-file=/opt/bitnami/mysql/tmp/mysqld.pid
    resources:
      limits:
        cpu: 8
        memory: 64Gi
      requests:
        cpu: 4
        memory: 16Gi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      capabilities:
        drop:
          - ALL
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
  secondary:
    resources:
      limits:
        cpu: 8
        memory: 64Gi
      requests:
        cpu: 4
        memory: 16Gi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      capabilities:
        drop:
          - ALL
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
  metrics:
    resources:
      limits:
        cpu: 2
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      capabilities:
        drop:
          - ALL
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true

# BigBang Additions

# Keystore Generation Configuration
# This Job runs as a Helm hook before install/upgrade to generate the keystore and create secrets
keystoreJob:
  enabled: true
  # Set to true to recreate the secret on each upgrade (useful for cert rotation)
  recreate: false
  # Certificate alias for keystore generation
  certAlias: tomcat
  # Keystore passwords
  trustStorePassword: dsoppassword
  keyStorePassword: dsoppassword
  keyStoreCertPassword: dsoppassword
  # Image for keystore generation (must have openssl installed)
  image: registry1.dso.mil/ironbank/redhat/ubi/ubi9
  tag: "9.5"
  # Resources for keystore Job
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 250m
      memory: 64Mi

domain: dev.bigbang.mil

istio:
  enabled: false
  mtls:
    mode: STRICT
  sidecar:
    enabled: false
    outboundTrafficPolicyMode: "REGISTRY_ONLY"
  serviceEntries:
    custom: []
  authorizationPolicies:
    enabled: false
    custom: []

routes:
  inbound:
    fortify:
      enabled: true
      gateways:
        - istio-gateway/public-ingressgateway
      hosts:
        - "fortify.{{ .Values.domain }}"
      service: fortify-ssc-service
      port: 80
      containerPort: 8080
      selector:
        app.kubernetes.io/name: fortify-ssc
        app.kubernetes.io/component: webapp
  outbound:
    bb-tests:
      enabled: false
      hosts:
        - repo1.dso.mil

networkPolicies:
  enabled: false
  # note: ztunnel does not exist yet, defaulting to false until ambient package is added
  hbonePortInjection:
    enabled: false
  egress:
    definitions:
      external-mysql:
        # Operators must provide CIDRs when using an external MySQL server.
        to: []
        ports:
          - port: 3306
            protocol: TCP
    from:
      fortify-webapp:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: fortify-ssc
            app.kubernetes.io/component: webapp
        to:
          definition:
            external-mysql: false
      keystore-job:
        podSelector:
          matchLabels:
            job: keystore-generator
        to:
          definition:
            kubeAPI: true
      keystore-job-hook:
        podSelector:
          matchLabels:
            job: keystore-generator
        metadata:
          annotations:
            helm.sh/hook: pre-install,pre-upgrade
            helm.sh/hook-weight: "-5"
            helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        to:
          definition:
            kubeAPI: true
  additionalPolicies: []



bbtests:
  enabled: false
  cypress:
    artifacts: true
    envs:
      cypress_url: "http://fortify-ssc-service:80"
      cypress_user: "admin"
      cypress_password: "admin"
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  scripts:
    image: "registry1.dso.mil/bigbang-ci/devops-tester:1.1.2"
    envs: {}


fortify_autoconfig: |
    appProperties:
      host.validation: false
      http.min_threads: 1
      http.max_threads: 4
      https.min_threads: 4
      https.max_threads: 150

    datasourceProperties:
      db.username: root
      db.password: password

      jdbc.url: 'jdbc:mysql://fortify-mysql:3306/ssc_db?sessionVariables=collation_connection=latin1_general_cs&rewriteBatchedStatements=true'

    dbMigrationProperties:

      migration.enabled: true
      migration.username: root
      migration.password: password

fortify_license: |
  <License>
